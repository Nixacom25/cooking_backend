spring.application.name=backend
server.port=${PORT:8099}
server.error.whitelabel.enabled=false
server.error.path=/error

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cooking_db?prepareThreshold=0}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:secret}

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
 
# Hikari Connection Pool Settings (Optimized for Render/Postgres Free Tier)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.max-lifetime=240000
# spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JWT Configuration
jwt.secret=${JWT_SECRET:my_super_secure_secret_key_that_is_long_enough_for_hs256_algorithm_2024_plus_additional_text_to_guarantee_that_the_generated_jwt_token_string_is_extremely_long_exceeding_the_requested_two_hundred_character_minimum_limit_for_added_security_padding}
jwt.expiration=${JWT_EXPIRATION:900000}

# Mail properties
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.from=${SMTP_FROM:${SMTP_USERNAME}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_HOST:smtp-relay.brevo.com}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
management.health.mail.enabled=false

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:sk-placeholder-key-replace-me}
ai.internal.secret=${AI_INTERNAL_SECRET:cooked_internal_bypass_secret_2024}
ai.api.base-url=${AI_API_BASE_URL:https://recipe.markhorsystems.com}

# Multipart Configuration (Enable large photo uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Social Auth Configuration
google.client.id=${GOOGLE_CLIENT_ID:VOTRE_CLIENT_ID_WEB.apps.googleusercontent.com}
apple.client.id=${APPLE_CLIENT_ID:com.cookedapp.app}

# Native IAP Configuration
google.play.service-account=${GOOGLE_PLAY_SERVICE_ACCOUNT:}
apple.iap.shared-secret=${APPLE_IAP_SHARED_SECRET:VOTRE_SHARED_SECRET}

# Deep Linking
app.deep-link.android.package-name=com.cookedapp.app
app.deep-link.android.sha256=${SHA256}
app.deep-link.ios.app-id=${TEAMID}.com.cookedapp.app