spring.application.name=backend
server.port=${PORT:8099}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cooking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:secret}

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
 
# Hikari Connection Pool Settings (Optimized for Render/Postgres)
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=2

# JWT Configuration
jwt.secret=${JWT_SECRET:my_super_secure_secret_key_that_is_long_enough_for_hs256_algorithm_2024_plus_additional_text_to_guarantee_that_the_generated_jwt_token_string_is_extremely_long_exceeding_the_requested_two_hundred_character_minimum_limit_for_added_security_padding}
jwt.expiration=${JWT_EXPIRATION:900000}

# Mail properties
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
management.health.mail.enabled=false

# OpenAI Configuration
openai.api.key=${OPENAI_API_KEY:sk-placeholder-key-replace-me}

# Multipart Configuration (Enable large photo uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Social Auth Configuration
google.client.id=${GOOGLE_CLIENT_ID:VOTRE_CLIENT_ID_WEB.apps.googleusercontent.com}
apple.client.id=${APPLE_CLIENT_ID:com.cookedapp.app}

# Native IAP Configuration
# google.play.service-account should be the Base64 encoded JSON key of your service account
google.play.service-account=${GOOGLE_PLAY_SERVICE_ACCOUNT:}
apple.iap.shared-secret=${APPLE_IAP_SHARED_SECRET:VOTRE_SHARED_SECRET}
