spring.application.name=backend

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/cooking_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:secret}

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:my_super_secure_secret_key_that_is_long_enough_for_hs256_algorithm_2024_plus_additional_text_to_guarantee_that_the_generated_jwt_token_string_is_extremely_long_exceeding_the_requested_two_hundred_character_minimum_limit_for_added_security_padding}
jwt.expiration=${JWT_EXPIRATION:900000}

# Mail properties
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:user@gmail.com}
spring.mail.password=${SMTP_PASSWORD:secret}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
