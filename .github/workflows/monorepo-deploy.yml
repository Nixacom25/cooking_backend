name: Monorepo CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    # --- BACKEND (JAVA) ---
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend with Maven
      run: |
        cd backend
        ./mvnw clean package -DskipTests

    # --- DOCKER LOGIN ---
    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # --- BUILD & PUSH IMAGES ---
    - name: Build and push Backend Image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/cooked-backend:latest

    - name: Build and push AI Recipe Image
      if: github.event_name == 'push'
      uses: docker/build-push-action@v5
      with:
        context: ./ai_recipe
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ai-recipe-service:latest

    # --- TRIGGER DEPLOY (Optional) ---
    - name: Trigger Deploy
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ ! -z "$DEPLOY_HOOK" ]; then
          curl -X POST "$DEPLOY_HOOK"
        else
          echo "No deploy hook found, skipping."
        fi
