name: Monorepo CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Test Backend (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Run Backend Tests
        run: |
          cd backend
          ./mvnw test

  test-ai:
    name: Test AI Service (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'ai_recipe/package-lock.json'
      - name: Install Dependencies
        run: |
          cd ai_recipe
          npm ci
      - name: Run AI Tests
        run: |
          cd ai_recipe
          npm test

  build-and-push:
    name: Build & Push Docker Images
    needs: [test-backend, test-ai]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cooked-backend:latest

      - name: Build and push AI Recipe Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_recipe
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ai-recipe-service:latest

      # --- TRIGGER DEPLOYS ---
      - name: Trigger Backend Deploy
        run: |
          if [ ! -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "Backend deploy triggered!"
          else
            echo "RENDER_DEPLOY_HOOK_URL not found, skipping."
          fi

      - name: Trigger AI Service Deploy
        run: |
          if [ ! -z "${{ secrets.RENDER_AI_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_AI_DEPLOY_HOOK }}"
            echo "AI Service deploy triggered!"
          else
            echo "RENDER_AI_DEPLOY_HOOK not found, skipping."
          fi
